kind = "web"
previewPath = "/"
title = "EcoMark"
version = "1.0.0"
id = "artifacts/ecomark"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22056

[services.development]
run = "pnpm --filter @workspace/ecomark run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ecomark", "run", "build" ]
publicDir = "artifacts/ecomark/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22056"
BASE_PATH = "/"
